name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths:
      - "front/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "front/**"
      - ".github/workflows/frontend.yml"

jobs:
  docker:
    name: Build & Push frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          IMAGE=europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tp-cloud/frontend:${{ github.sha }}
          docker build -t $IMAGE ./front
          docker push $IMAGE

      - name: Update Kubernetes deployment
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} \
            --region ${{ secrets.GKE_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}
          kubectl set image deployment/cloud-frontend \
            nginx=europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tp-cloud/frontend:${{ github.sha }}
          kubectl rollout status deployment/cloud-frontend --timeout=120s
