name: Backend CI

on:
  push:
    paths:
      - "back/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "back/**"
      - ".github/workflows/backend.yml"

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: back/requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: python -m pytest -v

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t tp-cloud-back:${{ github.sha }} ./back