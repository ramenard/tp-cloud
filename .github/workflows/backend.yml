name: Backend CI

on:
  push:
    branches: [main, dev]
    paths:
      - "services/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "services/**"
      - ".github/workflows/backend.yml"

jobs:
  lint:
    name: Lint — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, core]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements-test.txt
      - run: pip install -r requirements-test.txt
      - run: ruff check .

  secrets:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint, secrets]
    strategy:
      matrix:
        service: [auth, core]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements-test.txt
      - run: pip install -r requirements-test.txt
      - run: python -m pytest -v

  docker:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: auth
            env_vars: ""
          - service: core
            env_vars: >-
              AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }},
              AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }},
              S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }},
              AWS_REGION=${{ secrets.AWS_REGION }},
              AUTH_SERVICE_URL=${{ secrets.AUTH_SERVICE_URL }}
    steps:
      - uses: actions/checkout@v4

      - id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          IMAGE=europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tp-cloud/${{ matrix.service }}-service:${{ github.sha }}
          docker build -t $IMAGE ./services/${{ matrix.service }}
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          EXTRA=""
          if [ -n "${{ matrix.env_vars }}" ]; then
            EXTRA="--set-env-vars ${{ matrix.env_vars }}"
          fi
          gcloud run deploy ${{ matrix.service }}-service \
            --image europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tp-cloud/${{ matrix.service }}-service:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            $EXTRA
